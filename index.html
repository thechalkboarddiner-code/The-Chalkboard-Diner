<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chalkboard Diner | Official Site</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --chalkboard: #1a1a1a;
            --accent: #517c61;
            --chalk-white: #f5f5f5;
            --chalk-yellow: #fffda6;
            --chalk-pink: #ffadd7;
            --chalk-green: #aaffaa;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.6; }
        .container { width: 95%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header & Hero */
        header { background: white; border-bottom: 2px solid #eee; padding: 10px 0; text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo-small { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        
        #hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('storefront4.jpeg') no-repeat center center/cover;
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        #hero h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 3px; }

        /* Gallery Grid */
        .section-title { text-align: center; margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 2px; color: #444; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }
        .gallery img { width: 100%; height: 300px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        footer { text-align: center; padding: 50px; background: #1a1a1a; color: white; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpeg" alt="Logo" class="logo-small">
    </header>

    <section id="hero">
        <h1>THE CHALKBOARD DINER</h1>
        <p>Specialty Coffee & Comfort Food</p>
    </section>

    <div class="container">
        
        <h2 class="section-title">Our Menu & Shop</h2>
        <div class="gallery">
            <img src="menu.jpeg" alt="Main Menu">
            <img src="menu2.jpeg" alt="Coffee Menu">
            <img src="menu4.jpeg" alt="Specials Menu">
            
            <img src="storefront3.jpeg" alt="Diner Exterior">
            <img src="storefront4.jpeg" alt="Diner Entrance">
            <img src="interior1.jpg" alt="Diner Interior">
        </div>

        <h2 class="section-title">Food & Community</h2>
        <div class="gallery">
            <img src="food1.jpeg" alt="Signature Snacks">
            <img src="pizza.jpeg" alt="Fresh Pizza">
            
            <img src="customer.jpeg" alt="Happy Customers">
            <img src="customer4.jpeg" alt="Diner Vibes">
            <img src="customer5.jpeg" alt="Community Favorites">
        </div>

    </div>

    <footer>
        <p><strong>The Chalkboard Diner</strong></p>
        <p>Taytay, Rizal | Open until 11:00 PM</p>
    </footer>

</body>
</html>
